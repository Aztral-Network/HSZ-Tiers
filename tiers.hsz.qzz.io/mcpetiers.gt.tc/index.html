<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSZ Tiers | MCPE Ranking</title>

<!-- Minecraft Font -->
<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --bg-body: #0e0e10;
    --bg-header: #18181b;
    --bg-card: rgba(31, 31, 35, 0.85);
    --border: #2f2f35;
    --accent: #bb86fc;
    --discord: #5865F2;
    --text-main: #efeff1;
    --text-dim: #adadb8;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Minecraft', sans-serif;
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* Blurred Background */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("assets/bg.png") center/cover no-repeat;
    filter: blur(12px) brightness(0.4);
    transform: scale(1.1);
    z-index: -1;
}

/* Top Navigation */
.top-nav {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
}

.logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-size: 1.2rem;
}

.logo-wrap i {
    color: var(--accent);
}

.discord-pill {
    background: var(--discord);
    color: white;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.2s;
}

.discord-pill:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
}

/* Center Card */
.redirect-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: calc(100vh - 64px);
}

.card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 60px 80px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    animation: fadeIn 0.8s ease-out;
}

.card h1 {
    font-size: 2.2rem;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.card p {
    color: var(--text-dim);
    margin-bottom: 35px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 1rem;
}

/* Loading Bar */
.loader {
    width: 280px;
    height: 6px;
    background: #1f1f23;
    border-radius: 4px;
    overflow: hidden;
    margin: 0 auto 35px auto;
}

.loader-progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #bb86fc, #9b5cf7);
    animation: load 4s linear forwards;
}

/* Button */
.redirect-btn {
    background: var(--accent);
    color: black;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 6px;
    font-size: 0.9rem;
    transition: 0.2s;
    display: inline-block;
}

.redirect-btn:hover {
    filter: brightness(1.1);
    transform: translateY(-2px);
}

/* Animations */
@keyframes load {
    from { width: 0%; }
    to { width: 100%; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<script>
setTimeout(function() {
    window.location.href = "https://tiers.hsz.qzz.io";
}, 4000);
</script>

</head>
<body>

<div class="top-nav">
    <a href="#" class="logo-wrap">
        <i class="fas fa-sword"></i>
        <span>HSZ TIERS</span>
    </a>

    <a href="https://dsc.gg/w10lounge" class="discord-pill">
        <i class="fab fa-discord"></i> Discord
    </a>
</div>

<div class="redirect-container">
    <div class="card">
        <h1>HSZ TIERS</h1>
        <p>Por favor espera un rato mientras te redireccionamos a la página</p>

        <div class="loader">
            <div class="loader-progress"></div>
        </div>

        <a class="redirect-btn" href="https://tiers.hsz.qzz.io">
            Ir ahora
        </a>
    </div>
</div>

</body>
</html>

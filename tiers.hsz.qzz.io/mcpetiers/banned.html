{% extends "index.html" %}

{% block content %}
<div class="table-card">
    <div style="padding: 16px 20px; border-bottom: 1px solid var(--border); background: rgba(255,0,0,0.05);">
        <h2 style="margin: 0; font-size: 1.1rem; color: #ff6e6e; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-gavel"></i> {{ t.banned_players }}
        </h2>
    </div>
    <table class="banned-table">
        <thead>
            <tr>
                <th>{{ t.player }}</th>
                <th>{{ t.reason }}</th>
            </tr>
        </thead>
        <tbody>
            {% for player in players %}
            <tr>
                <td>
                    <div class="p-flex">
                        <div class="s-box">
                            {% if player.skin_path %}
                            <img src="{{ url_for('static', filename='skins/' + player.name + '_head.png') }}" class="head-img">
                            {% else %}
                            <div class="head-placeholder">?</div>
                            {% endif %}
                        </div>
                        <span class="p-name">{{ player.name }}</span>
                    </div>
                </td>
                <td style="color: #ff6e6e; font-weight: 500;">{{ player.ban_reason }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
